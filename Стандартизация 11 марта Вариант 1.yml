Задание 1. Исправление требований по критериям SMART
ФОРМА ДЛЯ ОТВЕТОВ https://forms.gle/izzuimHrJYw4k7j88
Кейс для задания 1. Мобильное приложение для заказа еды в студенческой столовой
Описание: Студенческая столовая университета хочет запустить мобильное приложение, позволяющее студентам и сотрудникам заранее заказывать обеды и оплачивать их онлайн. Приложение должно отображать меню на день, давать возможность выбрать блюда, указать время самовывоза и произвести оплату. Повара видят поступившие заказы и отмечают готовность. Администратор управляет меню и ценами. Целевая аудитория – студенты и сотрудники (около 5000 человек). Планируется выпуск на iOS и Android.
Ниже приведены 25 требований к этому проекту, каждое из которых нарушает один из критериев SMART. Перепишите их так, чтобы они соответствовали указанному критерию. Старайтесь сохранить суть исходного требования, но сделать его конкретным, измеримым, достижимым, релевантным или ограниченным во времени.

Критерий S (Specific – Конкретность)
1. Приложение должно быть удобным.
2. Интерфейс должен быть красивым.
3. Система должна быстро загружаться.
4. Оплата должна проходить надёжно.
5. Уведомления должны приходить вовремя.

Критерий M (Measurable – Измеримость)
6. Многие пользователи должны пользоваться приложением ежедневно.
7. Приложение должно поддерживать большое количество заказов.
8. Время ожидания заказа должно быть минимальным.
9. Система должна быть отказоустойчивой.
10. Обновления меню должны происходить оперативно.

Критерий A (Achievable – Достижимость)
11. Приложение должно одновременно обслуживать 100 000 пользователей (при бюджете проекта 500 тыс. руб. и команде из двух студентов).
12. Приложение должно работать на всех моделях телефонов, выпущенных с 2000 года.
13. Оплата должна приниматься всеми существующими банковскими картами мира.
14. Время отклика сервера должно составлять 1 миллисекунду.
15. Приложение должно само прогнозировать спрос на блюда с помощью искусственного интеллекта (при отсутствии данных и команды data science).

Критерий R (Relevant – Релевантность)
16. В приложении должен быть встроенный словарь иностранных слов.
17. Приложение должно показывать погоду на завтра.
18. Пользователи должны иметь возможность общаться в чате друг с другом.
19. В профиле нужно указывать семейное положение.
20. Приложение должно содержать мини-игру для ожидания заказа.

Критерий T (Time-bound – Ограниченность во времени)
21. Мы планируем добавить функцию отзывов.
22. Система должна быть сдана в эксплуатацию когда-нибудь.
23. Разработка дизайна должна быть завершена быстро.
24. Оплата через Apple Pay будет реализована в будущем.
25. Первую версию выпустим после Нового года (без указания года).

Задание 2. Формулировка требований для нового кейса
ФОРМА ДЛЯ ОТВЕТОВ https://forms.gle/XCGERcXP5DpUJ7uXA
Кейс для задания 2. Веб-сервис для поиска попутчиков среди студентов

Описание: Инициативная группа студентов предлагает создать веб-сервис, помогающий студентам находить попутчиков для совместных поездок на учёбу, мероприятия или домой. Сервис должен позволять пользователю указывать маршрут (откуда – куда), дату и время поездки, количество свободных мест в автомобиле или желание присоединиться к чужой поездке. Система должна показывать подходящие варианты, давать возможность связаться с водителем или пассажиром через внутренний чат. Для повышения безопасности планируется верификация через университетскую почту, рейтинг пользователей и отзывы. Проект рассчитан на студентов одного вуза (до 10 000 потенциальных пользователей). Доступ должен осуществляться через любой современный браузер с компьютера или мобильного устройства.

На основе описания сформулируйте пять функциональных и пять нефункциональных требований. Каждое требование должно быть записано в соответствии с критериями SMART. Для каждого нефункционального требования укажите его категорию (например, производительность, безопасность, надёжность, удобство использования, совместимость, масштабируемость и т.п.). Постарайтесь охватить разные функциональные области и разные категории нефункциональных характеристик.

