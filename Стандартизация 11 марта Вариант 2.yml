Задание 1. Исправление требований по критериям SMART
ФОРМА ДЛЯ ОТВЕТОВ https://forms.gle/izzuimHrJYw4k7j88
Кейс для задания 1. Веб-сервис для планирования совместных учебных проектов
Описание: Группа студентов хочет создать веб-сервис, помогающий организовывать командную работу над учебными проектами. Сервис должен позволять создавать проекты, приглашать участников, распределять задачи, устанавливать дедлайны, загружать файлы, оставлять комментарии и отслеживать прогресс. Преподаватели могут наблюдать за ходом проектов своих студентов. Платформа должна быть доступна через браузер на любых устройствах. Основная аудитория – студенты и преподаватели (до 2000 активных пользователей).
Ниже приведены 25 требований к этому проекту, каждое из которых нарушает один из критериев SMART. Перепишите их так, чтобы они соответствовали указанному критерию.

Критерий S (Specific – Конкретность)
1. Сервис должен быть удобным для командной работы.
2. Задачи должны легко создаваться.
3. Должна быть возможность общения.
4. Файлы должны загружаться нормально.
5. Прогресс проекта должен отображаться наглядно.

Критерий M (Measurable – Измеримость)
6.Много студентов должно использовать сервис.
7.Проекты должны завершаться вовремя.
8.Система должна быть быстрой.
9.Надёжность должна быть высокой.
10.Участники должны активно общаться.

Критерий A (Achievable – Достижимость)
11. Сервис должен поддерживать видеозвонки с 50 участниками одновременно (при ограниченных ресурсах студенческой команды).
12. Система должна автоматически проверять код на ошибки.
13. Должна быть возможность интеграции со всеми существующими LMS.
14. Время загрузки страницы должно составлять 0,1 секунды при любом интернете.
15. Сервис должен заменить Trello, Asana и Jira одновременно.

Критерий R (Relevant – Релевантность)
16. В профиле пользователя нужно указывать хобби.
17. Сервис должен предлагать рецепты на обед.
18. Можно добавить возможность играть в шахматы с коллегами.
19. На главной странице показывать курсы валют.
20. Включить онлайн-библиотеку учебников.

Критерий T (Time-bound – Ограниченность во времени)
21. Функция экспорта отчётов будет сделана позже.
22. Бета-версия выйдет скоро.
23. Дизайн должен быть готов к концу месяца (без года).
24. Релиз планируется на следующий семестр.
25. Интеграция с календарём будет реализована когда-нибудь.

Задание 2. Формулировка требований для нового кейса
ФОРМА ДЛЯ ОТВЕТОВ https://forms.gle/XCGERcXP5DpUJ7uXA
Кейс для задания 2. Система онлайн-записи в спортивные секции университета
Описание: Спортивный клуб университета нуждается в автоматизации записи студентов в различные секции (футбол, баскетбол, волейбол, плавание, шахматы и др.). Требуется разработать систему с веб-интерфейсом, где студенты могут просматривать расписание секций, информацию о тренерах, свободные места и записываться на тренировки. Тренеры должны иметь возможность просматривать список записавшихся, отмечать посещаемость, публиковать объявления. Администратор клуба управляет расписанием, лимитами мест и тренерским составом. Система должна отправлять напоминания о предстоящих тренировках по электронной почте. Планируется интеграция с порталом университета для автоматической проверки статуса студента. Количество потенциальных пользователей – до 5000 студентов, одновременно записываться могут до 500 человек.
На основе описания сформулируйте пять функциональных и пять нефункциональных требований. Каждое требование должно быть записано в соответствии с критериями SMART. Для каждого нефункционального требования укажите его категорию.
