Задание 1. Исправление требований по критериям SMART
ФОРМА ДЛЯ ОТВЕТОВ https://forms.gle/izzuimHrJYw4k7j88
Кейс для задания 1. Система учёта книг в университетской библиотеке
Описание: Университетская библиотека нуждается в автоматизации учёта книжного фонда и обслуживания читателей. Требуется разработать информационную систему, которая позволит библиотекарям регистрировать новые поступления, вести картотеку книг, отслеживать выдачу и возврат, управлять читательскими билетами, а читателям – искать книги в электронном каталоге, просматривать наличие, бронировать книги и продлевать срок пользования. Система должна иметь веб-интерфейс для читателей и десктопное приложение для библиотекарей. База данных содержит информацию о книгах, читателях и операциях.
Ниже приведены 25 требований к этому проекту, каждое из которых нарушает один из критериев SMART. Перепишите их так, чтобы они соответствовали указанному критерию.

Критерий S (Specific – Конкретность)
1. Поиск книг должен быть удобным.
2.Читатели должны легко находить нужную литературу.
3.Выдача книг должна оформляться быстро.
4.Отчёты должны быть информативными.
5.Интерфейс библиотекаря должен быть простым.

Критерий M (Measurable – Измеримость)
6.Много книг должно выдаваться ежедневно.
7.Читатели должны активно пользоваться каталогом.
8.Система должна работать без сбоев.
9.Задолженности должны возвращаться вовремя.
10.Пополнение каталога должно происходить регулярно.

Критерий A (Achievable – Достижимость)
11. Система должна автоматически заказывать новые книги у поставщиков.
12.Должна быть возможность распознавать книги по фотографии полки.
13.Время ответа на запрос к БД должно быть 1 мс (при текущем серверном оборудовании).
14.Система должна поддерживать 10 000 одновременных пользователей (при том что в вузе всего 3000 студентов).
15.Интерфейс должен быть переведён на 50 языков мира.

Критерий R (Relevant – Релевантность)
16. В личном кабинете читателя нужно показывать гороскоп.
17. Приложение должно содержать новостную ленту университета.
18. Библиотекари могут играть в пасьянс в свободное время.
19. Система должна рекомендовать фильмы по мотивам книг.
20. Добавить форум для обсуждения прочитанного.

Критерий T (Time-bound – Ограниченность во времени)
21. Модуль бронирования книг будет добавлен в будущем.
22.Миграция данных из старой системы произойдёт когда-нибудь.
23.Разработка отчётов завершится к концу квартала (без года).
24.Бета-тестирование начнётся после праздников.
25.Релиз запланирован на конец года (без указания года).


Задание 2. Формулировка требований для нового кейса
ФОРМА ДЛЯ ОТВЕТОВ https://forms.gle/XCGERcXP5DpUJ7uXA
Кейс для задания 2. Мобильное приложение для обмена учебными конспектами
Описание: Студенты разных факультетов хотят иметь мобильное приложение, позволяющее обмениваться учебными конспектами, шпаргалками, полезными ссылками и материалами. Приложение должно давать возможность загружать файлы (PDF, изображения, текстовые документы), присваивать им теги (предмет, тема, преподаватель), оценивать чужие материалы по шкале «полезно/бесполезно», оставлять комментарии. Должен быть поиск по тегам и ключевым словам. Для предотвращения злоупотреблений планируется модерация контента (жалобы, блокировка пользователей). Доступ только для авторизованных студентов университета (через корпоративную почту). Целевая аудитория – до 8000 студентов. Приложение должно работать на iOS и Android.
На основе описания сформулируйте пять функциональных и пять нефункциональных требований. Каждое требование должно быть записано в соответствии с критериями SMART. Для каждого нефункционального требования укажите его категорию.
